<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Онлайн-вебинар по маркетингу</title>
    <link rel="stylesheet" href="css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="css/tiny-slider.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.min.css">
</head>
<body>
    
        

        <section class="promo">
            <div class="container">
                <header class="header">
                    <div class="header__logo">
                        <img src="icons/logo.png" alt="Logo">
                    </div>

                    <a href="#">
                        <button class="header__btn">Заказать звонок</button>
                    </a>
                </header>

                <h1 class="promo__header">Пройдите тест и узнайте реальную стоимость<br>SEO продвижения вашего сайта</h1>
                <a href="#">
                    <button class="promo__btn">Пройти тест</button>
                </a>
                <div class="promo__descr">После прохождения теста вы получите<br>три <span>полезных</span> подарка</div>
                
                <div class="promo__info">
                    <div class="promo__item">
                        <img src="img/items/item1.png" alt="Item1" class="promo__item-img">
                        <div class="promo__item-wrapper">
                            <div class="promo__item-number">01</div>
                            <div class="promo__item-text">Бесплатный аудит<br>вашего продвижения</div>
                        </div>
                    </div>
                    <div class="promo__item">
                        <img src="img/items/item2.png" alt="Item2" class="promo__item-img">
                        <div class="promo__item-wrapper">
                            <div class="promo__item-number">02</div>
                            <div class="promo__item-text">Запросы, по которым<br>продвигаются конкуренты</div>
                        </div>
                    </div>
                    <div class="promo__item">
                        <img src="img/items/item3.png" alt="Item3" class="promo__item-img">
                        <div class="promo__item-wrapper">
                            <div class="promo__item-number">03</div>
                            <div class="promo__item-text">Добавление сайта<br>в Яндекс.Вебмастер</div>
                        </div>
                    </div>
                    
                    
                </div>

            </div>
        </section>

    <div class="overlay">
        <div class="modal" id="thanks">
            <div class="modal__close">
                <span></span>
                <span></span>
            </div>
            <div class="modal__subtitle">Спасибо за вашу заявку!</div>
        </div>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
